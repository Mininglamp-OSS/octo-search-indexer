# Headless Service: 给 KRaft StatefulSet 稳定的 Pod DNS
# (search-kafka-0.search-kafka.dmwork-test.svc.cluster.local)。
# clusterIP: None → 不分配 VIP, 直接解析到 Pod, KRaft quorum / advertised listener 需要它。
# 仅集群内, 不暴露外网。
apiVersion: v1
kind: Service
metadata:
  name: search-kafka
  labels:
    app: search-kafka
spec:
  clusterIP: None
  selector:
    app: search-kafka
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
